newsletter:
  name: "DevAI"
  tagline: "Herramientas de IA para devs, en español"
  author: "Alex"
  frequency: "weekly"
  # Email real donde lees las respuestas (idealmente = MAILERLITE_SENDER_EMAIL).
  # El reply-loop depende de esto. Vacío => se oculta el enlace "Responder al editor".
  reply_to: ""
  # Canal de envío del email: "ghost" (nativo, vía Mailgun) | "mailerlite" | "none" (solo web).
  # "ghost" REQUIERE Mailgun configurado en Ghost ANTES de activarlo (si no, el post queda en draft).
  email_provider: "none"
  ghost_newsletter_slug: "default"   # Ghost > Settings > Email newsletter > slug del newsletter

sources:
  rss:
    - url: "https://blog.anthropic.com/rss"
      name: "Anthropic"
    - url: "https://openai.com/blog/rss"
      name: "OpenAI"
    - url: "https://blog.google/technology/ai/rss/"
      name: "Google AI"
    - url: "https://github.blog/feed/"
      name: "GitHub"
    - url: "https://devblogs.microsoft.com/ai/feed/"
      name: "Microsoft AI"
    - url: "https://code.visualstudio.com/feed.xml"
      name: "VS Code"

  hackernews:
    keywords:
      - "claude code"
      - "cursor ai"
      - "github copilot"
      - "ai coding"
      - "mcp server"
      - "agentic"
      - "vibe coding"
      - "cline"
      - "windsurf"
      - "codex"
    min_score: 50

  reddit:
    subreddits:
      - "ClaudeAI"
      - "cursor"
      - "LocalLLaMA"
      - "ChatGPTPro"
    sort: "top"
    time: "week"
    min_upvotes: 100

  github_trending:
    topics:
      - "ai-coding"
      - "developer-tools"
      - "llm"
      - "mcp"

claude:
  model: "claude-sonnet-4-20250514"
  max_tokens_curation: 2000
  max_tokens_rewrite: 500

seo:
  gsc_site_url: "https://devaisemanal.com/"
  lookback_days: 28

publishing:
